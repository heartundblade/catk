# @package _global_

defaults:
  # - override /trainer: ddp
  - override /model: smart

model:
  model_config:
    lr: 5e-4
    lr_min_ratio: 1e-2
    token_processor:
      map_token_sampling: # open-loop
        num_k: 1 # for k nearest neighbors
        temp: 1.0 # uniform sampling
      agent_token_sampling: # closed-loop
        num_k: 1 # for k nearest neighbors
        temp: 1.0

# ckpt_path: null
ckpt_path: ${paths.log_dir}/pre_bc-debug/runs/2026-03-16_12-33-05/checkpoints/epoch_028.ckpt
# ckpt_path: CKPT_FOR_RESUME.ckpt # to resume training

trainer:
  limit_train_batches: 1.0
  limit_val_batches: 0.05
  check_val_every_n_epoch: 1
  max_epochs: 32

data:
  train_batch_size: 20
  val_batch_size: 20
  test_batch_size: 20
  num_workers: 20