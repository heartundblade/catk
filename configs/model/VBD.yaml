_target_: src.vbd.model.VBD.VBD
# model_name: VBD

# Data Config
# train_data_path: null
# val_data_path: null
# anchor_path: ${paths.root_dir}/src/vbd/data/cluster_64_center_dict.pkl
# log_dir: ./train_log


# Wandb Config
# use_wandb: False
# username: null
# project: null

# Checkpoint Config

# Model Config
cfg:
  agents_len: 64
  future_len: 80
  action_len: 2
  encoder_layers: 6
  prediction_type: sample
  encoder_version: v2 # v1: GRU, v2: MLP

  # Diffusion Params
  diffusion_steps: 50
  schedule_type: cosine
  schedule_s: 0
  schedule_e: 1
  schedule_tau: 1

  action_mean: [0.0, 0.0]
  action_std: [1.0, 0.15]
  clamp_value: 5.0

  # Training Params
  # seed: 42
  batch_size: 4
  num_workers: 16
  lr: 0.0002
  weight_decay: 0.01
  epochs: 16
  lr_warmup_step: 1000
  lr_step_freq: 1000
  lr_step_gamma: 0.98

  train_encoder: True
  train_denoiser: True
  train_predictor: True

  limit_train_batches: 1.0
  limit_val_batches: 1.0
  limit_test_batches: 1.0

  # Validation Params
  val_open_loop: true
  val_closed_loop: true
  fast_wosac_metric: False

  n_rollout_closed_val: 2
  step_len: 10
