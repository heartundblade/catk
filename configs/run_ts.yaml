# @package _global_

# Configuration for tree search and beam search
# Separate from training configuration

defaults:
  - _self_
  - data: waymo
  - model: smart
  - paths: default
  - hydra: default
  - tree_search: tree

# task name, determines output directory path
task_name: "tree_search"

# simply provide checkpoint path to resume training
ckpt_path: null

# seed for random number generators in pytorch, numpy and python.random
seed: 817

# Maximum number of batches to process (override tree_search.max_batches if needed)
# max_batches: 10